<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather App</title>
    <link rel="stylesheet" href="index.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
  </head>
  <body>
    <div class="card">
      <div class="search">
        <input
          type="text"
          placeholder="Ingrese el nombre de la ciudad"
          spellcheck="false"
        />
        <button><img src="assets/images/searchicon.svg" alt="search" /></button>
      </div>
      <div class="error">
        <p>Invalid city name</p>
      </div>
      <div class="weather inactive">
        <img class="weather-icon shadow" src="" alt="Clima Actual" />
        <h1 class="temp shadow">20°c</h1>
        <h2 class="city shadow">Cali</h2>
        <div class="details">
          <div class="col shadowsmall">
            <img src="assets/images/humidity-2.svg" alt="Humedad">
            <div class>
              <p class="humidity">%</p>
              <p>Humedad</p>
            </div>
          </div>
          <div class="col shadowsmall">
            <img src="assets/images/wind.png" alt="Velocidad">
            <div>
              <p class="windspeed"></p>
              <p>Velocidad</p>
            </div>
        <div>
          <script src="js/api-web.js">
            
          </script>
  </body>
</html>
